<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamFlix</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar" class="navbar">
    <a class="logo" href="#" data-page="home">STREAM<span>FLIX</span></a>
    <ul class="nav-links">
      <li><a href="#" data-page="home" class="active">Home</a></li>
      <li><a href="#" data-page="movies">Movies</a></li>
      <li><a href="#" data-page="tvshows">TV Shows</a></li>
      <li><a href="sports.html" class="sports-link">⚡ Sports</a></li>
    </ul>
    <div class="navbar-right">
      <div id="search-wrap" class="search-wrap">
        <button id="search-icon-btn" class="search-icon-btn" aria-label="Search">
          <i class="fas fa-search"></i>
        </button>
        <input id="search-input" type="text" placeholder="Search…" autocomplete="off" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile nav drawer -->
  <div id="mobile-nav" class="mobile-nav">
    <a href="#" data-page="home">Home</a>
    <a href="#" data-page="movies">Movies</a>
    <a href="#" data-page="tvshows">TV Shows</a>
    <a href="sports.html" class="sports-link">⚡ Sports</a>
  </div>

  <!-- HERO -->
  <section id="hero" class="hero">
    <div class="hero-gradient"></div>
    <div id="hero-content" class="hero-content"></div>
  </section>

  <!-- ROWS -->
  <main id="rows-wrapper" class="rows-wrapper">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </main>

  <!-- SEARCH PAGE -->
  <section id="search-page" class="search-page">
    <h2>Results for <span id="search-term"></span></h2>
    <div id="search-grid" class="cards-grid"></div>
  </section>

  <!-- CONTENT MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-box" class="modal">
      <button id="modal-close" class="modal-close" aria-label="Close">
        <i class="fas fa-times"></i>
      </button>
      <div id="modal-backdrop" class="modal-backdrop">
        <div class="modal-backdrop-gradient"></div>
        <div id="modal-hero-content" class="modal-hero-content"></div>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
