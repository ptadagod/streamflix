<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch — StreamFlix</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="watch-body">

  <!-- NAVBAR -->
  <nav id="navbar" class="navbar watch-navbar scrolled">
    <a class="logo" href="index.html">STREAM<span>FLIX</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html">Movies</a></li>
      <li><a href="index.html">TV Shows</a></li>
      <li><a href="sports.html" class="sports-link">⚡ Sports</a></li>
    </ul>
  </nav>

  <!-- PLAYER -->
  <div class="player-wrapper">
    <div class="player-aspect">
      <iframe id="player-iframe"
              class="player-iframe"
              src=""
              allowfullscreen
              allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
              referrerpolicy="no-referrer"
              scrolling="no">
      </iframe>
    </div>
  </div>

  <!-- BELOW PLAYER -->
  <div class="player-details">
    <div id="player-layout-inner" class="player-layout-inner">

      <!-- Main info column -->
      <div class="player-main-col">
        <h1 id="player-title" class="player-title"></h1>
        <div id="player-meta" class="player-meta"></div>
        <p id="player-overview" class="player-overview"></p>
        <div id="player-extra"></div>
        <div id="ep-selector"></div>
      </div>

      <!-- Similar content sidebar -->
      <aside class="player-sidebar-col">
        <div id="similar-container"></div>
      </aside>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
